# Ansible inventory for the DICOMweb-on-CUBE spike deployment.
#
# Everything runs on the local Docker host (the same machine that runs the
# miniChRIS-docker compose stack and the test Orthanc container). We therefore
# use a single host `localhost` with the local connection plugin -- no SSH.
#
# Run with:
#   ansible-playbook -i inventory.ini site.yml

[deploy_host]
localhost ansible_connection=local ansible_python_interpreter=auto_silent

[deploy_host:vars]
# Avoid a sudo/become prompt: every task here talks to the Docker daemon as the
# invoking user. If your user is not in the `docker` group, run the playbook
# with `--become` or add yourself to that group first (see README prerequisites).
ansible_become=false
