          readOnly: true
        plugin_piping_title:
          type: string
          readOnly: true
        plugin_piping_cpu_limit:
          type: integer
          readOnly: true
        plugin_piping_memory_limit:
          type: integer
          readOnly: true
        plugin_piping_gpu_limit:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
