components:
  schemas:
    AuthToken:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        token:
          type: string
          readOnly: true
      required:
      - password
      - token
      - username
    BlankEnum:
      enum:
      - ''
    BoolParameter:
      type: object
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        id:
          type: integer
          readOnly: true
        param_name:
          type: string
          readOnly: true
        value:
          type: boolean
        type:
          allOf:
          - $ref: '#/components/schemas/PluginParameterType'
          readOnly: true
        plugin_inst:
          type: string
          format: uri
          readOnly: true
        plugin_param:
          type: string
          format: uri
          readOnly: true
      required:
      - id
      - param_name
      - plugin_inst
      - plugin_param
      - type
      - url
      - value
    ChrisInstance:
      type: object
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        id:
          type: integer
          readOnly: true
        creation_date:
          type: string
          format: date-time
          readOnly: true
        name:
          type: string
          maxLength: 100
        uuid:
          type: string
          format: uuid
        job_id_prefix:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 600
      required:
      - creation_date
      - id
      - url
    Comment:
      type: object
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 100
        owner_username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          readOnly: true
        content:
          type: string
        feed:
          type: string
          format: uri
          readOnly: true
      required:
      - feed
      - id
      - owner_username
      - url
    ComputeResource:
      type: object
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        id:
          type: integer
          readOnly: true
        creation_date:
          type: string
          format: date-time
          readOnly: true
        modification_date:
          type: string
          format: date-time
          readOnly: true
        name:
          type: string
          maxLength: 100
        compute_url:
          type: string
          format: uri
          maxLength: 300
        compute_auth_url:
          type: string
          format: uri
          maxLength: 350
        compute_innetwork:
          type: boolean
          readOnly: true
        compute_requires_copy_job:
          type: boolean
          readOnly: true
        compute_requires_upload_job:
          type: boolean
          readOnly: true
        compute_user:
          type: string
          writeOnly: true
          maxLength: 32
          minLength: 4
        compute_password:
          type: string
          writeOnly: true
          maxLength: 100
          minLength: 8
        compute_auth_token:
          type: string
          writeOnly: true
          maxLength: 500
        description:
          type: string
          maxLength: 600
        max_job_exec_seconds:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
      required:
      - compute_innetwork
      - compute_password
      - compute_requires_copy_job
      - compute_requires_upload_job
      - compute_url
      - compute_user
      - creation_date
      - id
      - modification_date
      - name
      - url
    DefaultPipingBoolParameter:
      type: object
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        id:
          type: integer
          readOnly: true
        value:
          type: boolean
          nullable: true
        type:
          allOf:
          - $ref: '#/components/schemas/PluginParameterType'
          readOnly: true
        plugin_piping_id:
