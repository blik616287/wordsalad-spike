          readOnly: true
        plugin_piping_number_of_workers:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
          readOnly: true
        previous_plugin_piping_id:
          type: integer
          nullable: true
          readOnly: true
        param_name:
          type: string
          readOnly: true
        param_id:
          type: integer
          readOnly: true
        plugin_piping:
          type: string
          format: uri
          readOnly: true
        plugin_name:
          type: string
          readOnly: true
        plugin_version:
          type: string
          readOnly: true
        plugin_id:
          type: integer
          readOnly: true
        plugin_param:
          type: string
          format: uri
          readOnly: true
