openapi: 3.0.3
info:
  title: 'ChRIS Research Integration System: Ultron BackEnd (CUBE) API'
  version: 0.0.0+unknown
  description: The ChRIS Ultron BackEnd (CUBE) is the core backend API of ChRIS. It
    manages ChRIS users, plugins, pipelines, and the provenance of data analyses as
    ChRIS feeds.
  contact:
    name: Fetal-Neonatal Neuroimaging Developmental Science Center
    url: https://chrisproject.org
    email: dev@babymri.org
  license:
    name: MIT
    url: https://github.com/FNNDSC/ChRIS_ultron_backEnd/blob/master/LICENSE
paths:
  /api/v1/:
    get:
      operationId: root_list
      description: A view for the collection of feeds. This is also the API's "homepage".
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      security:
      - tokenAuth: []
      - basicAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedFeedList'
          description: ''
  /api/v1/{id}/:
    get:
      operationId: root_retrieve
      description: A feed view.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      security:
      - tokenAuth: []
      - basicAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Feed'
          description: ''
    put:
      operationId: root_update
      description: A feed view.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Feed'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Feed'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Feed'
      security:
      - tokenAuth: []
      - basicAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Feed'
          description: ''
    delete:
      operationId: root_destroy
      description: A feed view.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      security:
      - tokenAuth: []
      - basicAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
