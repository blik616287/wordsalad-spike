[defaults]
inventory = inventory.ini
roles_path = roles
host_key_checking = False
# The `yaml` stdout callback (community.general.yaml) was removed in
# community.general 12 / ansible-core 2.20; the modern equivalent is the builtin
# default callback rendering task results as YAML.
stdout_callback = default
callback_result_format = yaml
# Make `assert`/`debug` output readable in the meeting demo.
display_skipped_hosts = True
retry_files_enabled = False
# Keep demo output clean (no cowsay banners).
nocows = True

[ssh_connection]
# We only ever target localhost via the local connection plugin; no SSH used.
pipelining = True
